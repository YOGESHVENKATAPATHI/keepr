name: keepr
description: A new Flutter project.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  file_picker: ^8.0.0
  path: ^1.9.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  glassmorphism: ^3.0.0
  url_launcher: ^6.3.2
  percent_indicator: ^4.2.5
  dio: ^5.9.1
  syncfusion_flutter_pdfviewer: ^32.2.3
  universal_html: ^2.3.0
  google_sign_in: ^6.1.1
  flutter_secure_storage: ^8.0.0
  flutter_svg: ^2.0.9
  permission_handler: ^12.0.1
  flutter_local_notifications: ^17.0.0
  flutter_background_service: ^5.1.0
  device_info_plus: ^12.3.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  image_path: "assets/keeprlogo.png"
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/keeprlogo.png"
  windows:
    generate: true
    image_path: "assets/keeprlogo.png"
    icon_size: 256

flutter:
  uses-material-design: true
  assets:
    - assets/keeprlogo.svg
